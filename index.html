<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>FleetIQ</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="topbar">
  <h2>FleetIQ <span>/ Centro de control</span></h2>
  <div class="live">🟢 EN VIVO</div>
</header>

<div class="container">

  <!-- KPIs -->
  <div class="kpis">
    <div class="card">32<br><span>Unidades</span></div>
    <div class="card green">24<br><span>Operativas</span></div>
    <div class="card yellow">5<br><span>Revisión</span></div>
    <div class="card red">3<br><span>Urgente</span></div>
  </div>

  <!-- TABLA -->
  <div class="table-box">
    <h3>Ranking de riesgo</h3>
    <table>
      <thead>
        <tr>
          <th>Unidad</th>
          <th>Riesgo</th>
          <th>Score</th>
          <th>Acción</th>
        </tr>
      </thead>
      <tbody id="tabla"></tbody>
    </table>
  </div>

</div>

<!-- CHAT -->
<div class="chat">
  <h3>🤖 Analista IA</h3>
  <div id="chatBox"></div>
</div>

<script src="script.js"></script>
</body>
</html>
